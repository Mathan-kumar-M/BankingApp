<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Banking System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Banking System <span style="font-size:0.8rem; background:#ef4444; color:#fff; padding:2px 8px; border-radius:12px; margin-left:10px; vertical-align:middle;">Admin Mode</span></div>
        <div class="navbar-nav">
            <button class="btn btn-secondary" onclick="window.location.href='/dashboard.html'" style="margin-top:0; padding: 0.5rem 1rem;">Back to User Dashboard</button>
            <button class="btn btn-secondary" onclick="API.logout()" style="margin-top:0; padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container" style="grid-template-columns: 1fr;">
        
        <div class="card">
            <h3 class="card-title">Pending Users Approvals</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pendingUsersTable">
                    <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Loading pending users...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="card" style="margin-top: 2rem;">
            <h3 class="card-title">All Users</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody id="allUsersTable">
                    <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Loading all users...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
    <script>
        async function loadPendingUsers() {
            try {
                const users = await API.get('/api/admin/pending');
                const tbody = document.getElementById('pendingUsersTable');
                tbody.innerHTML = '';
                
                if (!users || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">No pending users.</td></tr>';
                    return;
                }

                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td><span style="font-weight:600;">${u.name}</span></td>
                            <td>${u.email}</td>
                            <td><span class="badge withdraw">Pending</span></td>
                            <td>
                                <button onclick="handleApprove(${u.id})" class="btn" style="padding:0.25rem 0.5rem; background-color:var(--success); font-size:0.8rem; margin-right: 5px;">Approve</button>
                                <button onclick="handleReject(${u.id})" class="btn" style="padding:0.25rem 0.5rem; background-color:var(--danger); font-size:0.8rem;">Reject</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) {
                showToast("Access Denied or Failed to Load Pending Users.", true);
            }
        }

        async function loadAllUsers() {
            try {
                const users = await API.get('/api/admin/users');
                const tbody = document.getElementById('allUsersTable');
                tbody.innerHTML = '';
                
                if (!users || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">No users found.</td></tr>';
                    return;
                }

                users.forEach(u => {
                    const statusClass = u.status === 'APPROVED' ? 'deposit' : 'withdraw';
                    const roleClass = u.role === 'ADMIN' ? 'deposit' : 'transfer';
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td><span style="font-weight:600;">${u.name}</span></td>
                            <td>${u.email}</td>
                            <td><span class="badge ${statusClass}">${u.status || 'UNKNOWN'}</span></td>
                            <td><span class="badge ${roleClass}">${u.role || 'USER'}</span></td>
                        </tr>
                    `;
                });
            } catch(e) {
                // Silent catch, might be duplicate error from pending users
            }
        }

        async function handleApprove(id) {
            try {
                const res = await API.post(`/api/admin/approve/${id}`, {});
                showToast(typeof res === 'string' ? res : "User approved");
                loadPendingUsers();
                loadAllUsers();
            } catch(e) {
                showToast("Approval failed.", true);
            }
        }

        async function handleReject(id) {
            try {
                const res = await API.post(`/api/admin/reject/${id}`, {});
                showToast(typeof res === 'string' ? res : "User rejected");
                loadPendingUsers();
                loadAllUsers();
            } catch(e) {
                showToast("Rejection failed.", true);
            }
        }

        // Initialize
        loadPendingUsers();
        loadAllUsers();
    </script>
</body>
</html>
