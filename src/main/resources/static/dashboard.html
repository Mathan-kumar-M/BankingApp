<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Banking System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Banking System</div>
        <div class="navbar-nav">
            <span id="userNameDisplay" style="font-weight: 600;">Loading...</span>
            <button class="btn btn-secondary" onclick="API.logout()" style="margin-top:0; padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <!-- Left Column: User Account Info & Actions -->
        <div>
            <!-- Account Info -->
            <div class="card">
                <h3 class="card-title">My Account</h3>
                <div style="font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem;">
                    ₹ <span id="accountBalance">0.00</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">
                    Account ID: <span id="accountId">--</span><br>
                    Account No: <span id="accountNumber">--</span>
                </div>
            </div>

            <!-- Make Transaction -->
            <div class="card">
                <h3 class="card-title">Quick Action</h3>
                <form id="actionForm">
                    <div class="input-group">
                        <label for="actionType">Action Type</label>
                        <select id="actionType" class="btn" style="background:#f3f4f6; color:#333; text-align:left; border:1px solid #d1d5db; width:100%; margin-bottom:1rem;">
                            <option value="deposit">Deposit</option>
                            <option value="withdraw">Withdraw</option>
                            <option value="transfer">Transfer</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" step="0.01" min="0.01" required placeholder="0.00">
                    </div>

                    <div class="input-group hidden" id="receiverGroup">
                        <label for="receiverAccountNumber">Receiver Account No.</label>
                        <input type="text" id="receiverAccountNumber" placeholder="Account No">
                    </div>

                    <button type="submit" class="btn">Confirm</button>
                </form>
            </div>
            
            <!-- Admin Link (Visible only if admin) -->
            <div class="card hidden" id="adminPanelLink">
                <h3 class="card-title">Admin Controls</h3>
                <button class="btn" onclick="window.location.href='/admin.html'">Go to Admin Dashboard</button>
            </div>
        </div>

        <!-- Right Column: Transactions History -->
        <div>
            <div class="card" style="height: 100%;">
                <h3 class="card-title">Recent Transactions</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                        <!-- Loaded dynamically -->
                        <tr>
                            <td colspan="3" style="text-align:center; color: var(--text-muted);">Loading transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
    <script>
        let currentUserId = null;
        let currentAccountId = null;

        async function loadProfile() {
            try {
                // Determine if Admin by trying an admin endpoint or based on profile role if any
                const profile = await API.get('/api/user/profile');
                document.getElementById('userNameDisplay').innerText = profile.name + (profile.role === 'ADMIN' ? ' (Admin)' : '');
                currentUserId = profile.id;
                
                if (profile.role === 'ADMIN' || profile.name.toLowerCase().includes('admin')) {
                    document.getElementById('adminPanelLink').classList.remove('hidden');
                }

                const account = await API.get('/api/user/accounts');
                if (account) {
                    currentAccountId = account.id;
                    document.getElementById('accountBalance').innerText = parseFloat(account.balance).toFixed(2);
                    document.getElementById('accountId').innerText = account.id;
                    document.getElementById('accountNumber').innerText = account.accountNumber || '--';
                }
            } catch(e) {
                showToast("Failed to load profile. Maybe no account setup yet?", true);
            }
        }

        async function loadTransactions() {
            try {
                const transactions = await API.get('/transactions/view');
                const tbody = document.getElementById('transactionsTableBody');
                tbody.innerHTML = '';
                
                if (!transactions || transactions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: var(--text-muted);">No transactions found.</td></tr>`;
                    return;
                }

                // Since we don't know the exact DTO format, assuming standard fields: type, amount, etc.
                transactions.forEach(t => {
                    const typeClass = t.type ? t.type.toLowerCase() : 'deposit'; // fallback
                    const html = `
                        <tr>
                            <td><span class="badge ${typeClass}">${t.type || 'Unknown'}</span></td>
                            <td style="font-weight:600;">₹${t.amount}</td>
                            <td>${t.description || '-'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += html;
                });
            } catch (e) {
                // Might fail if not authenticated or no transactions
            }
        }

        document.getElementById('actionType').addEventListener('change', (e) => {
            if (e.target.value === 'transfer') {
                document.getElementById('receiverGroup').classList.remove('hidden');
                document.getElementById('receiverAccountNumber').required = true;
            } else {
                document.getElementById('receiverGroup').classList.add('hidden');
                document.getElementById('receiverAccountNumber').required = false;
            }
        });

        document.getElementById('actionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const action = document.getElementById('actionType').value;
            const amount = document.getElementById('amount').value;
            
            if (!currentAccountId && action !== 'transfer') { // Check depends on API
                showToast("No account linked.", true);
                return;
            }

            try {
                let res;
                if (action === 'transfer') {
                    const receiverAccountNumber = document.getElementById('receiverAccountNumber').value;
                    res = await API.post('/transactions/transfer', {
                        senderId: currentUserId,
                        receiverAccountNumber: receiverAccountNumber,
                        amount: amount
                    });
                } else if (action === 'withdraw') {
                    res = await API.post('/transactions/withdraw', {
                        accountId: currentAccountId,
                        amount: amount
                    });
                } else {
                    res = await API.post('/transactions/deposit', {
                        accountId: currentAccountId,
                        amount: amount
                    });
                }
                
                showToast(typeof res === 'string' ? res : "Transaction successful!");
                document.getElementById('amount').value = '';
                document.getElementById('receiverAccountNumber').value = '';
                
                // Reload data
                loadProfile();
                loadTransactions();
            } catch (e) {
                showToast("Transaction failed.", true);
            }
        });

        // Initialize
        loadProfile();
        loadTransactions();
    </script>
</body>
</html>
