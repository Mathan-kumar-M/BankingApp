<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Maara Bank — A modern, secure digital banking platform for managing your finances." />
  <title>Maara Bank — Digital Banking</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
</head>

<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- App shell -->
  <div id="app">
    <!-- Sidebar nav (hidden on auth pages) -->
    <nav id="sidebar" class="sidebar hidden">
      <div class="sidebar-brand">
        <span class="brand-icon material-icons-round">account_balance</span>
        <span class="brand-text">Maara Bank</span>
      </div>
      <ul class="nav-links" id="nav-links"></ul>
      <div class="sidebar-footer">
        <button id="btn-logout" class="nav-item logout-btn">
          <span class="material-icons-round">logout</span>
          <span>Sign Out</span>
        </button>
      </div>
    </nav>

    <!-- Main content area -->
    <main id="main-content" class="main-content">
      <div id="page-content"></div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
